<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chia Sẻ Ảnh & Video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Media Share Space</h1>
    </header>

    <div class="container">
        <div class="upload-section">
            <h2>Tải Ảnh hoặc Video của bạn lên</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="mediaTitle">Tiêu đề:</label>
                    <input type="text" id="mediaTitle" placeholder="Nhập tiêu đề cho file..." required>
                </div>
                <div class="form-group">
                    <label for="mediaFile">Chọn file (Ảnh hoặc Video):</label>
                    <input type="file" id="mediaFile" accept="image/*,video/*" required>
                </div>
                <button type="submit" class="btn-submit">Đăng Lên</button>
            </form>
        </div>

        <div class="video-list">
            <h2>Nội dung mới nhất</h2>
            <div id="mediaContainer">
                <p class="no-video">Chưa có nội dung nào được đăng. Hãy là người đầu tiên!</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
