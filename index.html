<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Studio - Không Gian Chia Sẻ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <span class="logo-icon">✨</span> Media<span>Studio</span>
            </div>
            <p class="subtitle">Lưu trữ & Chia sẻ nội dung chất lượng cao</p>
        </div>
    </header>

    <div class="container">
        <section class="upload-section">
            <h2>📤 Tải khoảnh khắc của bạn</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="mediaTitle">Tiêu đề tác phẩm</label>
                    <input type="text" id="mediaTitle" placeholder="Đặt một cái tên thật ấn tượng..." required>
                </div>
                
                <div class="form-group">
                    <label for="mediaFile" class="custom-file-upload">
                        <span class="upload-icon">📁</span>
                        <span class="upload-text">Chọn tập tin Ảnh hoặc Video</span>
                        <span class="upload-hint">Hỗ trợ file chất lượng cao lên tới 2GB</span>
                    </label>
                    <input type="file" id="mediaFile" accept="image/*,video/*" required>
                    <div id="fileSelectedName" class="file-name-display"></div>
                </div>
                
                <button type="submit" class="btn-submit">Đăng lên không gian</button>
            </form>
        </section>

        <section class="feed-section">
            <h2>🔥 Khám phá mới nhất</h2>
            <div id="mediaContainer">
                <div class="no-video">
                    <div class="empty-icon">📭</div>
                    <p>Chưa có nội dung nào được đăng.</p>
                    <span>Hãy là người đầu tiên chia sẻ khoảnh khắc tại đây!</span>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
