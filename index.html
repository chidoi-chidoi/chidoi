<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaStudio Pro - Không Gian Lưu Trữ Vô Hạn</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">✨</span>
                <h1>MediaStudio <span class="badge-pro">PRO</span></h1>
            </div>
            <p class="subtitle">Không gian lưu trữ cá nhân • Không giới hạn dung lượng</p>
        </header>

        <section class="upload-section">
            <form id="uploadForm">
                <div class="form-group">
                    <label for="mediaTitle">Tiêu đề tác phẩm</label>
                    <input type="text" id="mediaTitle" placeholder="Nhập tên video hoặc hình ảnh..." required>
                </div>

                <div class="form-group">
                    <label class="dropzone" for="mediaFile">
                        <div class="dropzone-content">
                            <span class="upload-icon">📁</span>
                            <p class="dropzone-text">Nhấp để chọn tập tin từ thiết bị</p>
                            <span class="dropzone-hint">Hỗ trợ Video & Hình ảnh chất lượng cao</span>
                        </div>
                        <input type="file" id="mediaFile" accept="video/*,image/*" required>
                    </label>
                    <div id="fileSelectedName" class="file-status"></div>
                </div>

                <button type="submit" class="btn-submit">
                    <span class="btn-icon">🚀</span> Đăng Lên Không Gian
                </button>
            </form>
        </section>

        <section class="gallery-section">
            <h2 class="section-title">🔥 Khám phá kho lưu trữ</h2>
            <div id="mediaContainer" class="media-grid">
                <div class="no-video">
                    <span class="empty-icon">🍃</span>
                    <p>Chưa có nội dung nào được đăng tải</p>
                    <span>Bộ sưu tập của bạn đang trống, hãy chọn một file ở trên!</span>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
